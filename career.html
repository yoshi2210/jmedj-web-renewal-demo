<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>求人・物件(ドクター求NAVI) | メディカルパートナー(刷新モック)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="audit-banner">
  刷新モック — 求人・物件情報。02章の方針どおり、一般読者向けコンテンツとは別ゾーン(橙)として視覚分離しつつ、絞り込みUIは他ゾーンと共通コンポーネントです。
</div>

<header class="site-header">
  <div class="wrap header-row">
    <a class="logo" href="index.html">メディカルパートナー<small>日本医事新報社(刷新モック)</small></a>
    <div style="flex:1"></div>
    <div class="header-actions">
      <button class="icon-btn">カート</button>
      <a class="icon-btn" href="account.html">ログイン</a>
      <button class="icon-btn primary">会員登録</button>
    </div>
  </div>
  <div class="wrap search-row">
    <form class="search-form" onsubmit="location.href='search-results.html?q='+encodeURIComponent(this.q.value); return false;">
      <input class="search-input" name="q" type="search" placeholder="書籍・記事・動画・求人/物件をキーワードで検索">
      <button class="search-submit" type="submit">検索</button>
    </form>
  </div>
</header>

<main class="wrap">
  <p class="breadcrumb"><a href="index.html">TOP</a> &gt; 求人・物件(ドクター求NAVI)</p>

  <div class="tabs" role="tablist" id="careerTabs">
    <button class="tab-btn active" role="tab" aria-selected="true" data-type="jobs">医師求人</button>
    <button class="tab-btn" role="tab" aria-selected="false" data-type="properties">医療物件</button>
  </div>

  <div class="listing-layout">
    <aside class="facet-panel" aria-label="絞り込み">
      <div class="facet-group">
        <h4>地域</h4>
        <div id="regionFacets"></div>
      </div>
      <button class="facet-reset" id="resetFacets">絞り込みをクリア</button>
    </aside>

    <div>
      <div class="listing-toolbar">
        <span id="listingCount">読み込み中…</span>
      </div>
      <div class="card-grid" id="listingGrid"></div>
      <div class="empty-state" id="listingEmpty" style="display:none; margin-top:16px;">
        <h2>条件に一致する情報が見つかりませんでした</h2>
        <p>地域の絞り込みを変更するか、「絞り込みをクリア」をお試しください。</p>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="wrap footer-bottom">
    (刷新モック) 日本医事新報社 — <a href="index.html" style="color:#e3e8f5;">トップに戻る</a>
  </div>
</footer>

<script src="assets/js/app.js"></script>
<script src="assets/js/listing-career.js"></script>
</body>
</html>
